<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sanza Empréstimos</title>

<style>
body{
    margin:0;
    font-family: Arial;
    background:#f4f6f9;
}

/* HEADER */
header{
    background:#0a7d3b;
    color:white;
    padding:15px;
    text-align:center;
    font-size:20px;
}

/* DASHBOARD */
.dashboard{
    display:flex;
    gap:10px;
    padding:10px;
}

.card{
    flex:1;
    background:white;
    padding:10px;
    border-radius:10px;
    text-align:center;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

/* FORM */
.form{
    padding:15px;
}

input{
    width:100%;
    padding:12px;
    margin-top:10px;
    border-radius:8px;
    border:1px solid #ccc;
}

/* BOTÕES */
button{
    padding:10px;
    border:none;
    border-radius:8px;
    margin-top:10px;
    cursor:pointer;
    background:#0a7d3b;
    color:white;
}

button:hover{
    opacity:0.9;
}

.btn-delete{
    background:#e74c3c;
}

/* CLIENTE */
.cliente{
    background:#fff;
    padding:15px;
    margin:15px;
    border-radius:10px;
    box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.nome{
    font-weight:bold;
}
</style>
</head>

<body>

<header>💰 Sanza Empréstimos</header>

<div class="dashboard">
    <div class="card">Emprestado<br><b id="totalEmprestado">Kz 0,00</b></div>
    <div class="card">Dívida<br><b id="totalDivida">Kz 0,00</b></div>
    <div class="card">Lucro<br><b id="totalLucro">Kz 0,00</b></div>
</div>

<div class="form">
    <input id="nome" placeholder="Nome do cliente">
    <input id="valor" type="number" placeholder="Valor">
    <button onclick="salvar()">Salvar</button>
</div>

<div id="lista"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCur6eOFsD32uz6EEwT-pfNPii-pKq1AGs",
  authDomain: "sanza-emprestimos.firebaseapp.com",
  projectId: "sanza-emprestimos"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const lista = document.getElementById("lista");

function formatar(valor){
    return valor.toLocaleString('pt-AO',{
        style:'currency',
        currency:'AOA'
    });
}

window.salvar = async function(){
    let nome = document.getElementById('nome').value;
    let valor = parseFloat(document.getElementById('valor').value);

    if(!nome || !valor){
        alert("Preencha os campos");
        return;
    }

    let juros = valor * 0.35;
    let total = valor + juros;

    await addDoc(collection(db, "clientes"), {
        nome, valor, juros, total
    });

    document.getElementById('nome').value="";
    document.getElementById('valor').value="";

    carregar();
}

window.apagar = async function(id){
    await deleteDoc(doc(db, "clientes", id));
    carregar();
}

window.editar = async function(id, nomeAtual, valorAtual){
    let novoNome = prompt("Editar nome:", nomeAtual);
    let novoValor = parseFloat(prompt("Editar valor:", valorAtual));

    if(!novoNome || !novoValor) return;

    let juros = novoValor * 0.35;
    let total = novoValor + juros;

    await updateDoc(doc(db, "clientes", id), {
        nome: novoNome,
        valor: novoValor,
        juros,
        total
    });

    carregar();
}

async function carregar(){
    lista.innerHTML = "";

    let emprestado=0, divida=0, lucro=0;

    const querySnapshot = await getDocs(collection(db, "clientes"));

    querySnapshot.forEach((docItem)=>{
        let d = docItem.data();
        let id = docItem.id;

        emprestado += d.valor;
        divida += d.total;
        lucro += d.juros;

        lista.innerHTML += `
        <div class="cliente">
            <div class="nome">${d.nome}</div>
            <div>💰 ${formatar(d.valor)}</div>
            <div>📊 Juros: ${formatar(d.juros)}</div>
            <div>📈 Total: ${formatar(d.total)}</div>

            <br>

            <button onclick="editar('${id}', '${d.nome}', ${d.valor})">Editar</button>
            <button class="btn-delete" onclick="apagar('${id}')">Apagar</button>
        </div>
        `;
    });

    document.getElementById('totalEmprestado').innerText = formatar(emprestado);
    document.getElementById('totalDivida').innerText = formatar(divida);
    document.getElementById('totalLucro').innerText = formatar(lucro);
}

carregar();
</script>

</body>
</html>
