<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sanza Empréstimos</title>

<style>
body{
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background:#f4f6f9;
}

/* HEADER */
header{
    background:#0a7d3b;
    color:#fff;
    padding:18px;
    text-align:center;
    font-size:20px;
    font-weight:bold;
}

/* CONTAINER */
.container{
    max-width:900px;
    margin:auto;
    padding:20px;
}

/* DASHBOARD */
.dashboard{
    display:flex;
    gap:15px;
    margin-bottom:20px;
}

.card{
    flex:1;
    background:#fff;
    padding:15px;
    border-radius:12px;
    text-align:center;
    box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.card h3{
    margin:0;
    font-size:14px;
    color:#777;
}

.card p{
    margin:5px 0 0;
    font-size:18px;
    font-weight:bold;
}

/* FORM */
.form{
    background:#fff;
    padding:20px;
    border-radius:12px;
    box-shadow:0 2px 8px rgba(0,0,0,0.08);
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin-top:10px;
    border-radius:8px;
    border:1px solid #ddd;
}

/* BOTÕES */
button{
    padding:10px 14px;
    border:none;
    border-radius:8px;
    margin-top:10px;
    cursor:pointer;
    font-weight:bold;
}

.btn-save{
    background:#0a7d3b;
    color:#fff;
}

.btn-edit{
    background:#3498db;
    color:#fff;
}

.btn-delete{
    background:#e74c3c;
    color:#fff;
}

button:hover{
    opacity:0.9;
}

/* CLIENTES */
.cliente{
    background:#fff;
    padding:15px;
    margin-bottom:15px;
    border-radius:12px;
    box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.nome{
    font-weight:bold;
    font-size:16px;
    margin-bottom:8px;
}

.info{
    font-size:14px;
}
</style>
</head>

<body>

<header>💰 Sanza Empréstimos</header>

<div class="container">

    <!-- DASHBOARD -->
    <div class="dashboard">
        <div class="card">
            <h3>Emprestado</h3>
            <p id="totalEmprestado">Kz 0,00</p>
        </div>

        <div class="card">
            <h3>Dívida</h3>
            <p id="totalDivida">Kz 0,00</p>
        </div>

        <div class="card">
            <h3>Lucro</h3>
            <p id="totalLucro">Kz 0,00</p>
        </div>
    </div>

    <!-- FORM -->
    <div class="form">
        <h2>Novo Empréstimo</h2>
        <input id="nome" placeholder="Nome do cliente">
        <input id="valor" type="number" placeholder="Valor">
        <button class="btn-save" onclick="salvar()">Salvar</button>
    </div>

    <!-- LISTA -->
    <div id="lista"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCur6eOFsD32uz6EEwT-pfNPii-pKq1AGs",
  authDomain: "sanza-emprestimos.firebaseapp.com",
  projectId: "sanza-emprestimos",
  storageBucket: "sanza-emprestimos.firebasestorage.app",
  messagingSenderId: "789742780283",
  appId: "1:789742780283:web:114b9c40497a561e2007de"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const lista = document.getElementById("lista");

function formatar(valor){
    return valor.toLocaleString('pt-AO',{
        style:'currency',
        currency:'AOA'
    });
}

async function salvar(){
    let nome = document.getElementById('nome').value;
    let valor = parseFloat(document.getElementById('valor').value);

    if(!nome || !valor) return;

    let juros = valor * 0.35;
    let total = valor + juros;

    await addDoc(collection(db, "clientes"), {
        nome, valor, juros, total
    });

    document.getElementById('nome').value = "";
    document.getElementById('valor').value = "";

    carregar();
}

window.salvar = salvar;

async function apagar(id){
    await deleteDoc(doc(db, "clientes", id));
    carregar();
}
window.apagar = apagar;

async function editar(id, nomeAtual, valorAtual){
    let novoNome = prompt("Editar nome:", nomeAtual);
    let novoValor = parseFloat(prompt("Editar valor:", valorAtual));

    if(!novoNome || !novoValor) return;

    let juros = novoValor * 0.35;
    let total = novoValor + juros;

    await updateDoc(doc(db, "clientes", id), {
        nome: novoNome,
        valor: novoValor,
        juros,
        total
    });

    carregar();
}
window.editar = editar;

async function carregar(){
    lista.innerHTML = "";

    let emprestado=0, divida=0, lucro=0;

    const querySnapshot = await getDocs(collection(db, "clientes"));

    querySnapshot.forEach((docItem)=>{
        let d = docItem.data();
        let id = docItem.id;

        emprestado += d.valor;
        divida += d.total;
        lucro += d.juros;

        lista.innerHTML += `
        <div class="cliente">
            <div class="nome">${d.nome}</div>
            <div class="info">💰 ${formatar(d.valor)}</div>
            <div class="info">📊 Juros: ${formatar(d.juros)}</div>
            <div class="info">📈 Total: ${formatar(d.total)}</div>

            <button class="btn-edit" onclick="editar('${id}', '${d.nome}', ${d.valor})">✏️ Editar</button>
            <button class="btn-delete" onclick="apagar('${id}')">🗑 Apagar</button>
        </div>
        `;
    });

    document.getElementById('totalEmprestado').innerText = formatar(emprestado);
    document.getElementById('totalDivida').innerText = formatar(divida);
    document.getElementById('totalLucro').innerText = formatar(lucro);
}

carregar();
</script>

</body>
</html>
