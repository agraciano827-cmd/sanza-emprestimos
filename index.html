<!DOCTYPE html>

<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sanza Empréstimos</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
  font-family: Arial;
  background:#f0f2f5;
  margin:0;
}

header{
  background:#0a7d3b;
  color:white;
  padding:15px;
  text-align:center;
  font-size:20px;
  font-weight:bold;
}

.container{
  padding:15px;
  max-width:900px;
  margin:auto;
}

.card{
  background:white;
  padding:15px;
  border-radius:12px;
  margin-bottom:10px;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

input{
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:8px;
  border:1px solid #ccc;
}

button{
  padding:10px;
  border:none;
  border-radius:8px;
  margin:5px;
  cursor:pointer;
}

.btn-primary{ background:#0a7d3b; color:white;}
.btn-danger{ background:#d9534f; color:white;}
.btn-edit{ background:#0275d8; color:white;}

.dashboard{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.dash-box{
  flex:1;
  background:white;
  padding:15px;
  border-radius:10px;
  text-align:center;
}
</style>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "sanza-emprestimos.firebaseapp.com",
  projectId: "sanza-emprestimos"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let lista = [];

function kz(valor){
  return "Kz " + valor.toLocaleString("pt-PT",{minimumFractionDigits:2});
}

window.login = ()=>{
  if(senha.value==="1989"){
    loginBox.style.display="none";
    appBox.style.display="block";
    carregar();
  }
}

window.salvar = async ()=>{
  let valor = Number(valorI.value);
  let juros = valor*0.35;
  let total = valor+juros;

  await addDoc(collection(db,"clientes"),{
    nome:nomeI.value,
    valor,
    juros,
    total
  });

  carregar();
}

window.apagar = async(id)=>{
  await deleteDoc(doc(db,"clientes",id));
  carregar();
}

async function carregar(){
  let snap = await getDocs(collection(db,"clientes"));
  lista = snap.docs.map(d=>({id:d.id,...d.data()}));

  let totalEmp=0, totalDiv=0, lucro=0;

  listaHTML.innerHTML="";

  lista.forEach(d=>{
    totalEmp+=d.valor;
    totalDiv+=d.total;
    lucro+=d.juros;

    let div=document.createElement("div");
    div.className="card";
    div.innerHTML=`
      <b>${d.nome}</b><br>
      💰 ${kz(d.valor)}<br>
      📊 Juros: ${kz(d.juros)}<br>
      💵 Total: ${kz(d.total)}<br><br>

      <button class="btn-danger" onclick="apagar('${d.id}')">Apagar</button>
    `;
    listaHTML.appendChild(div);
  });

  totalEmpHTML.innerText=kz(totalEmp);
  totalDivHTML.innerText=kz(totalDiv);
  lucroHTML.innerText=kz(lucro);
}
</script>

</head>

<body>

<header>
  <img src="logo.png" height="40"><br>
  Sanza Empréstimos
</header>

<div class="container">

<div id="loginBox" class="card">
<input id="senha" type="password" placeholder="Senha">
<button class="btn-primary" onclick="login()">Entrar</button>
</div>

<div id="appBox" style="display:none;">

<div class="dashboard">
  <div class="dash-box">Emprestado<br><b id="totalEmpHTML"></b></div>
  <div class="dash-box">Dívida<br><b id="totalDivHTML"></b></div>
  <div class="dash-box">Lucro<br><b id="lucroHTML"></b></div>
</div>

<div class="card">
<h3>Novo Empréstimo</h3>
<input id="nomeI" placeholder="Nome">
<input id="valorI" type="number" placeholder="Valor">
<button class="btn-primary" onclick="salvar()">Salvar</button>
</div>

<div id="listaHTML"></div>

</div>

</div>

</body>
</html>
