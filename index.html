<!DOCTYPE html>

<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sanza Empréstimos</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCur6eOFsD32uz6EEwT-pfNPii-pKq1AGs",
  authDomain: "sanza-emprestimos.firebaseapp.com",
  projectId: "sanza-emprestimos",
  storageBucket: "sanza-emprestimos.firebasestorage.app",
  messagingSenderId: "789742780283",
  appId: "1:789742780283:web:114b9c40497a561e2007de"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let listaGlobal = [];

window.login = function(){
  if(document.getElementById('senha').value === '1989'){
    document.getElementById('login').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    carregar();
  }
}

window.salvar = async function(){
  let nome = nomeI.value;
  let contacto = contactoI.value;
  let valor = Number(valorI.value);
  let dias = Number(diasI.value);
  let item = itemI.value;
  let credor = credorI.value;

  let juros = valor * 0.35;
  let total = valor + juros;

  let vencimento = new Date();
  vencimento.setDate(vencimento.getDate() + dias);

  await addDoc(collection(db, "clientes"), {
    nome, contacto, valor, juros, total, dias, item, credor, vencimento
  });

  carregar();
}

window.editar = function(id){
  let d = listaGlobal.find(x=>x.id===id);
  nomeI.value = d.nome;
  contactoI.value = d.contacto;
  valorI.value = d.valor;
  diasI.value = d.dias;
  itemI.value = d.item;
  credorI.value = d.credor;

  salvarBtn.onclick = async ()=>{
    let juros = valorI.value * 0.35;
    let total = Number(valorI.value) + juros;

    await updateDoc(doc(db,"clientes",id),{
      nome: nomeI.value,
      contacto: contactoI.value,
      valor: Number(valorI.value),
      juros,
      total
    });

    salvarBtn.onclick = salvar;
    carregar();
  }
}

window.apagar = async function(id){
  await deleteDoc(doc(db,"clientes",id));
  carregar();
}

window.pesquisar = function(){
  let termo = busca.value.toLowerCase();
  render(listaGlobal.filter(x=>x.nome.toLowerCase().includes(termo)));
}

window.gerarPDF = function(d){
  const { jsPDF } = window.jspdf;
  let docp = new jsPDF();

  docp.text("Sanza Empréstimos", 20, 20);
  docp.text("Cliente: "+d.nome, 20, 40);
  docp.text("Valor: "+d.valor+" Kz", 20, 50);
  docp.text("Total: "+d.total+" Kz", 20, 60);

  docp.save("recibo.pdf");
}

async function carregar(){
  let snap = await getDocs(collection(db,"clientes"));
  listaGlobal = snap.docs.map(d=>({id:d.id,...d.data()}));
  render(listaGlobal);
}

function render(lista){
  let totalEmp = 0, totalDiv = 0;

  listaHTML.innerHTML = "";

  lista.forEach(d=>{
    totalEmp += d.valor;
    totalDiv += d.total;

    let div = document.createElement("div");
    div.innerHTML = `
    <b>${d.nome}</b> - ${d.total} Kz <br>
    <button onclick="editar('${d.id}')">✏️</button>
    <button onclick="apagar('${d.id}')">🗑️</button>
    <button onclick='gerarPDF(${JSON.stringify(d)})'>🧾</button>
    <hr>`;
    listaHTML.appendChild(div);
  });

  totalEmpHTML.innerText = totalEmp;
  totalDivHTML.innerText = totalDiv;
}
</script>

<style>
body{font-family:Arial;background:#f4f4f4;text-align:center}
input{padding:10px;margin:5px;width:80%}
button{padding:8px;margin:3px}
</style>

</head>

<body>

<h1>💰 Sanza Empréstimos</h1>

<div id="login">
<input id="senha" type="password">
<button onclick="login()">Entrar</button>
</div>

<div id="app" style="display:none;">

<h3>📊 Dashboard</h3>
Emprestado: <span id="totalEmpHTML"></span> Kz |
Dívida: <span id="totalDivHTML"></span> Kz

<br><br>

<input id="busca" placeholder="Pesquisar" onkeyup="pesquisar()">

<h3>Novo</h3>
<input id="nomeI" placeholder="Nome"><br>
<input id="contactoI" placeholder="Contacto"><br>
<input id="valorI" placeholder="Valor"><br>
<input id="diasI" placeholder="Dias"><br>
<input id="itemI" placeholder="Item"><br>
<input id="credorI" placeholder="Credor"><br>

<button id="salvarBtn" onclick="salvar()">Salvar</button>

<h3>Clientes</h3>
<div id="listaHTML"></div>

</div>

</body>
</html>
